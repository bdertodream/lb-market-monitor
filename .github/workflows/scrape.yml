# .github/workflows/scrape.yml
# LB Market Monitor - Lebanon + UAE Price Tracker
# Runs scrapers and deploys the dashboard to GitHub Pages

name: Scrape & Deploy

on:
  schedule:
    # Every hour
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      # --- Lebanon OLX Scrapers ---
      - name: Run LB real estate scraper
        run: python olx_scraper.py

      - name: Run LB car scraper
        run: python olx_scraper_cars.py

      - name: Run LB plates scraper
        run: python olx_scraper_plates.py

      # --- UAE Dubizzle Scrapers ---
      - name: Run UAE property scraper
        run: python dubizzle_scraper.py

      - name: Run UAE car scraper
        run: python dubizzle_scraper_cars.py

      - name: Commit and push updated data
        run: |
          git config user.name "Market Scraper Bot"
          git config user.email "bot@noreply.github.com"
          git add listings_db.json drops_feed.json listings_db_cars.json drops_feed_cars.json listings_db_plates.json drops_feed_plates.json listings_db_uae.json drops_feed_uae.json listings_db_uae_cars.json drops_feed_uae_cars.json
          git diff --staged --quiet || git commit -m "Scrape $(date +%Y-%m-%d\ %H:%M)"
          git pull --rebase -X theirs origin main || (git checkout --theirs . && git add -A && git rebase --continue)
          git push

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest data
        run: git pull origin main

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          [ -f drops_feed.json ] && cp drops_feed.json _site/ || true
          [ -f drops_feed_cars.json ] && cp drops_feed_cars.json _site/ || true
          [ -f drops_feed_plates.json ] && cp drops_feed_plates.json _site/ || true
          [ -f drops_feed_uae.json ] && cp drops_feed_uae.json _site/ || true
          [ -f drops_feed_uae_cars.json ] && cp drops_feed_uae_cars.json _site/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
